<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站粉丝追踪</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
    .container{max-width:960px;margin:0 auto;padding:32px 16px}
    .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:20px}
    .face{width:80px;height:80px;border-radius:50%}
    .info h1{font-size:24px;color:#f0f6fc}
    .info p{color:#8b949e;margin-top:4px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
    .stat-box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center}
    .stat-box .value{font-size:22px;font-weight:700;color:#f0f6fc}
    .stat-box .label{font-size:12px;color:#8b949e;margin-top:4px}
    .chart-wrap{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:24px;height:400px;position:relative}
    .time-range{display:flex;gap:8px;margin-bottom:16px}
    .time-range button{padding:6px 16px;border:1px solid #30363d;border-radius:6px;background:transparent;color:#8b949e;cursor:pointer}
    .time-range button.active{background:#58a6ff;color:#fff;border-color:#58a6ff}
    .input-box{text-align:center;padding:100px 20px}
    input{padding:10px;width:200px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#fff}
    button{padding:10px 20px;border-radius:6px;border:none;background:#58a6ff;color:#fff;cursor:pointer}
  </style>
</head>
<body>
  <div class="container" id="app"></div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const app = document.getElementById('app');

    if (!uid) {
      app.innerHTML = `<div class="input-box">
        <h1>查询B站UP主</h1>
        <input type="text" id="uidInput" placeholder="请输入 uid">
        <button onclick="window.location.href='?uid=' + document.getElementById('uidInput').value">查看</button>
      </div>`;
    } else {
      fetchData();
    }

    async function fetchData() {
      try {
        const res = await fetch(`./data/${uid}.json`);
        const { meta, records } = await res.json();
        render(meta, records);
      } catch (e) {
        app.innerHTML = `<h1>加载失败</h1><p>${e.message}</p>`;
      }
    }

    let chart = null;
    function render(meta, records) {
      app.innerHTML = `
        <div class="card">
          <img src="${meta.face}" class="face">
          <div class="info">
            <h1>${meta.name}</h1>
            <p>${meta.sign || '暂无签名'}</p>
          </div>
        </div>
        <div class="stats">
          <div class="stat-box"><div class="value">${records[records.length-1].fans.toLocaleString()}</div><div class="label">当前粉丝</div></div>
          <div class="stat-box"><div class="value">${meta.level}</div><div class="label">等级</div></div>
          <div class="stat-box"><div class="value">${meta.archive_count}</div><div class="label">稿件数</div></div>
        </div>
        <div class="chart-wrap">
          <div class="time-range" id="timeRange">
            <button data-days="1">1天</button>
            <button data-days="7" class="active">7天</button>
            <button data-days="30">30天</button>
            <button data-days="180">180天</button>
            <button data-days="0">全部</button>
          </div>
          <canvas id="chart"></canvas>
        </div>
      `;
      
      const renderChart = (days) => {
        const filtered = days === 0 ? records : records.filter(r => new Date(r.time) > Date.now() - days * 86400000);
        const ctx = document.getElementById('chart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: 'line',
          data: { datasets: [{ data: filtered.map(r => ({x: new Date(r.time), y: r.fans})), borderColor: '#58a6ff', fill: true, backgroundColor: 'rgba(88,166,255,0.08)', tension: 0.3, pointRadius: 0 }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: { x: { type: 'time', ticks: {color:'#8b949e'} }, y: { ticks: {color:'#8b949e', callback: v => v.toLocaleString()} } },
            plugins: { legend: { display: false } }
          }
        });
      };
      
      document.querySelectorAll('#timeRange button').forEach(btn => btn.onclick = function() {
        document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderChart(parseInt(this.dataset.days));
      });
      renderChart(7);
    }
  </script>
</body>
</html>
