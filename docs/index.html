<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站粉丝追踪</title>
  <link rel="icon" href="./favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-main: #f0f6fc;
      --text-dim: #8b949e;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-fill: rgba(88,166,255,0.08);
      --positive: #3fb950;
      --negative: #f85149;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #ffffff;
        --card-bg: #f6f8fa;
        --text-main: #24292f;
        --text-dim: #57606a;
        --border: #d0d7de;
        --accent: #0969da;
        --accent-fill: rgba(9,105,218,0.08);
        --positive: #1a7f37;
        --negative: #cf222e;
      }
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-color);color:var(--text-main);min-height:100vh}
    .container{max-width:960px;margin:0 auto;padding:32px 16px}
    .card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:20px}
    .face{width:80px;height:80px;border-radius:50%}
    .info h1{font-size:24px;color:var(--text-main)}
    .info h1 a{color:inherit;text-decoration:none}
    .info h1 a:hover{color:var(--accent);text-decoration:underline}
    .info p{color:var(--text-dim);margin-top:4px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
    .stat-box{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
    .stat-box .value{font-size:22px;font-weight:700;color:var(--text-main)}
    .stat-box .value.positive{color:var(--positive)}
    .stat-box .value.negative{color:var(--negative)}
    .stat-box .label{font-size:12px;color:var(--text-dim);margin-top:4px}
    .chart-wrap{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:24px;height:400px;position:relative}
    .time-range{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .time-range button{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-dim);cursor:pointer}
    .time-range button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .input-box{text-align:center;padding:100px 20px}
    .query-form{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:24px}
    .query-form input{height:36px;width:200px;padding:0 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-color);color:var(--text-main);line-height:36px}
    .query-form button{height:36px;width:80px;padding:0 20px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;line-height:36px}
  </style>
</head>
<body>
  <div class="container" id="app"></div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const app = document.getElementById('app');

    if (!uid) {
      app.innerHTML = `<div class="input-box">
        <h1>追踪B站UP主粉丝数</h1>
        <div class="query-form">
          <input type="text" id="uidInput" placeholder="请输入 uid">
          <button onclick="window.location.href='?uid=' + document.getElementById('uidInput').value">查看</button>
        </div>
      </div>`;
    } else {
      fetchData();
    }

    async function fetchData() {
      try {
        const res = await fetch(`./data/${encodeURIComponent(uid)}.json`, { cache: 'no-store' });
        if (!res.ok) {
          renderError(res.status === 404 ? '没有这个UP主的数据' : '数据加载失败');
          return;
        }
        const { meta, records } = await res.json();
        if (!meta || !Array.isArray(records)) {
          renderError('数据格式错误');
          return;
        }
        if (records.length === 0) {
          renderError('暂无粉丝记录');
          return;
        }
        render(meta, records);
      } catch (e) {
        renderError('数据加载失败');
      }
    }

    function renderError(message) {
      app.innerHTML = '<div class="input-box"><h1 id="errorTitle"></h1></div>';
      document.getElementById('errorTitle').textContent = message;
    }

    let chart = null;
    function render(meta, records) {
      const latest = records[records.length - 1];
      const todayStart = new Date();
      todayStart.setHours(0, 0, 0, 0);
      const recordsBeforeToday = records.filter(r => new Date(r.time) < todayStart);
      const recordsToday = records.filter(r => new Date(r.time) >= todayStart);
      const todayBase = recordsBeforeToday[recordsBeforeToday.length - 1] || recordsToday[0];
      const todayChange = todayBase ? latest.fans - todayBase.fans : 0;
      const todayChangeText = `${todayChange >= 0 ? '+' : ''}${todayChange.toLocaleString()}`;
      const todayChangeClass = todayChange > 0 ? 'positive' : todayChange < 0 ? 'negative' : '';

      app.innerHTML = `
        <div class="card">
          <img src="${meta.face}" class="face" referrerpolicy="no-referrer">
          <div class="info">
            <h1><a href="https://space.bilibili.com/${uid}" target="_blank" rel="noopener noreferrer">${meta.name}</a></h1>
            <p>${meta.sign || '暂无签名'}</p>
          </div>
        </div>
        <div class="stats">
          <div class="stat-box"><div class="value">${latest.fans.toLocaleString()}</div><div class="label">当前粉丝</div></div>
          <div class="stat-box"><div class="value ${todayChangeClass}">${todayChangeText}</div><div class="label">今日变化</div></div>
          <div class="stat-box"><div class="value">${meta.like_num.toLocaleString()}</div><div class="label">获赞数</div></div>
          <div class="stat-box"><div class="value">${meta.archive_count}</div><div class="label">稿件数</div></div>
        </div>
        <div class="chart-wrap">
          <div class="time-range" id="timeRange">
            <button data-days="1">1天</button>
            <button data-days="7" class="active">7天</button>
            <button data-days="30">30天</button>
            <button data-days="90">90天</button>
            <button data-days="365">365天</button>
            <button data-days="0">全部</button>
          </div>
          <canvas id="chart"></canvas>
        </div>
      `;
      
      let selectedPoints = [];

      const renderChart = (days) => {
        selectedPoints = [];
        const filtered = days === 0 ? records : records.filter(r => new Date(r.time) > Date.now() - days * 86400000);
        const ctx = document.getElementById('chart').getContext('2d');
        if (chart) chart.destroy();

        const computedStyle = getComputedStyle(document.documentElement);
        const colorDim = computedStyle.getPropertyValue('--text-dim').trim();
        const colorBorder = computedStyle.getPropertyValue('--border').trim();
        const colorAccent = computedStyle.getPropertyValue('--accent').trim();
        const colorAccentFill = computedStyle.getPropertyValue('--accent-fill').trim();
        const pointStep = Math.max(1, Math.ceil(filtered.length / 180));

        const formatDuration = ms => {
          const abs = Math.abs(ms);
          const days = Math.floor(abs / 86400000);
          const hours = Math.floor((abs % 86400000) / 3600000);
          const minutes = Math.floor((abs % 3600000) / 60000);
          if (days > 0) return `${days}天${hours > 0 ? ` ${hours}小时` : ''}`;
          if (hours > 0) return `${hours}小时${minutes > 0 ? ` ${minutes}分钟` : ''}`;
          return `${minutes}分钟`;
        };

        const drawLabel = (ctx, text, x, y) => {
          const paddingX = 8;
          const paddingY = 5;
          ctx.save();
          ctx.font = '12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif';
          const width = ctx.measureText(text).width + paddingX * 2;
          const height = 24;
          const area = chart.chartArea;
          const left = Math.max(area.left + 4, Math.min(x - width / 2, area.right - width - 4));
          const top = Math.max(area.top + 4, Math.min(y - height / 2, area.bottom - height - 4));
          ctx.fillStyle = computedStyle.getPropertyValue('--card-bg').trim();
          ctx.strokeStyle = colorBorder;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.roundRect(left, top, width, height, 6);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = colorDim;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(text, left + width / 2, top + height / 2);
          ctx.restore();
        };

        const drawPoint = (ctx, x, y) => {
          ctx.save();
          ctx.fillStyle = computedStyle.getPropertyValue('--card-bg').trim();
          ctx.strokeStyle = colorAccent;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(x, y, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        };

        const comparisonPlugin = {
          id: 'comparisonOverlay',
          afterDatasetsDraw(chart) {
            if (selectedPoints.length === 0) return;
            const { ctx, chartArea, scales } = chart;
            const points = [...selectedPoints].sort((a, b) => new Date(a.time) - new Date(b.time));

            ctx.save();
            ctx.strokeStyle = colorAccent;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 4]);

            if (points.length === 1) {
              const p = points[0];
              const x = scales.x.getPixelForValue(new Date(p.time));
              const y = scales.y.getPixelForValue(p.fans);
              ctx.beginPath();
              ctx.moveTo(x, chartArea.top);
              ctx.lineTo(x, chartArea.bottom);
              ctx.moveTo(chartArea.left, y);
              ctx.lineTo(chartArea.right, y);
              ctx.stroke();
              ctx.restore();
              drawPoint(ctx, x, y);
              return;
            }

            const [a, b] = points;
            const x1 = scales.x.getPixelForValue(new Date(a.time));
            const y1 = scales.y.getPixelForValue(a.fans);
            const x2 = scales.x.getPixelForValue(new Date(b.time));
            const y2 = scales.y.getPixelForValue(b.fans);
            ctx.setLineDash([8, 5]);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.restore();

            drawPoint(ctx, x1, y1);
            drawPoint(ctx, x2, y2);
            drawLabel(ctx, formatDuration(new Date(b.time) - new Date(a.time)), (x1 + x2) / 2, y1 - 18);
            const diffFans = b.fans - a.fans;
            drawLabel(ctx, `${diffFans >= 0 ? '+' : ''}${diffFans.toLocaleString()} 粉丝`, x2 + 48, (y1 + y2) / 2);
          }
        };

        chart = new Chart(ctx, {
          type: 'line',
          data: { datasets: [{ data: filtered.map(r => ({x: new Date(r.time), y: r.fans})), borderColor: colorAccent, fill: true, backgroundColor: colorAccentFill, tension: 0.3, pointRadius: ctx => ctx.dataIndex % pointStep === 0 ? 3 : 0, pointHoverRadius: 5, pointHitRadius: 10 }] },
          plugins: [comparisonPlugin],
          options: {
            responsive: true, maintainAspectRatio: false,
            onClick: (event) => {
              const elements = chart.getElementsAtEventForMode(event, 'nearest', { intersect: true }, true);
              if (elements.length === 0) {
                selectedPoints = [];
                chart.update();
                return;
              }
              const point = filtered[elements[0].index];
              selectedPoints = selectedPoints.length >= 2 ? [point] : [...selectedPoints, point];
              chart.update();
            },
            scales: { 
              x: { 
                type: 'time', 
                time: {
                  minUnit: 'hour',
                  tooltipFormat: 'yyyy-MM-dd HH:mm',
                  displayFormats: {
                    millisecond: 'HH:mm:ss.SSS',
                    second: 'HH:mm:ss',
                    minute: 'HH:mm',
                    hour: 'HH:mm',
                    day: 'MM-dd',
                    week: 'MM-dd',
                    month: 'yyyy-MM',
                    quarter: 'yyyy QQQ',
                    year: 'yyyy'
                  }
                },
                ticks: { color: colorDim }, 
                grid: { color: colorBorder },
                border: { color: colorBorder }
              }, 
              y: { 
                ticks: { color: colorDim, callback: v => v.toLocaleString() }, 
                grid: { color: colorBorder },
                border: { color: colorBorder }
              } 
            },
            plugins: { legend: { display: false } }
          }
        });
      };
      
      document.querySelectorAll('#timeRange button').forEach(btn => btn.onclick = function() {
        document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderChart(parseInt(this.dataset.days));
      });
      renderChart(7);
    }
  </script>
</body>
</html>
